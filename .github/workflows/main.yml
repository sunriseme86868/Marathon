name: production deploy

on:
  push:
    branches:
      - main

jobs:
  staging-test:
    runs-on: ubuntu-latest
    steps:
      - id: ssh
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          SSH_KEY: ${{ secrets.DEV_SSHE_SSH_KEY }}

      - name: deploy staging
        run: ssh ${{ steps.ssh.outputs.SERVER }} bash /app/a-bando/deploy.sh a-bando

      - name: run test on staging
        run: ssh ${{ steps.ssh.outputs.SERVER }} "cd /ci && npx cypress run --spec cypress/e2e/a-bando.cy.js

  production-deploy:
    runs-on: ubuntu-latest
    needs: staging-test
    steps:
      - id: ssh
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}

      - name: deploy production
        run: ssh ${{ steps.ssh.outputs.SERVER }} bash /app/a-bando/deploy.sh a-bando
