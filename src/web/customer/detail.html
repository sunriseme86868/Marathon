<html lang="ja">
<head>

    <title>詳細一覧画面</title>
    <!-- Bootstrap CSSの読み込み -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <!-- ここにHTMLを書く -->
         <h2 class="mb-4">詳細一覧画面</h2>
         <p></p>
         
         <ul>
             <li><strong>会社名:</strong> <span id="confirm-companyName"></span></li>
             <li><strong>業種:</strong> <span id="confirm-industry"></span></li>
             <li><strong>連絡先:</strong> <span id="confirm-contact"></span></li>

             <button onclick="submitDate()" class="btn btn-danger">登録を確定</button>

    </div>
