<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詳細一覧画面</title>
    <!-- Bootstrap CSSの読み込み -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <!-- ここにHTMLを書く -->
         <div class ="card-header bg-dark text-white">
             <h2 class="h5 mb-0">顧客詳細(ID:<span id="confirm-id">-</span>)</h2>
         </div>
         <p></p>
         
         <ul>
             <li><strong>会社名:</strong> <span id="confirm-companyName"></span></li>
             <li><strong>業種:</strong> <span id="confirm-industry"></span></li>
             <li><strong>連絡先:</strong> <span id="confirm-contact"></span></li>
             <li><strong>所在地:</strong> <span id="confirm-location"></span></li>
         </ul>
        <button class="btn btn-secondary" onclick="location.href='./list.html'">顧客一覧表示画面へ戻る</button> 
        <button class="btn btn-danger" id="delete-btn">この顧客情報を削除する</button>

    </div>
    <script type="module">
        import config from "../config.js";
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        console.log("URLから取得したID:", id); // ここでIDをログに出力

        if (id) {
            document.getElementById('confirm-id').textContent = id;
        }
            fetch(`${config.apiUrl}/customers/${id}`)
            .then(response => {
                console.log(response); // ここでレスポンスオブジェクトをログに出力
                return response.json();
            })
            .then(data => {
                console.log("サーバーから取得したデータ:", data); // ここで解析されたデータをログに出力

                const customer = Array.isArray(data)? data[0] : data; // データが配列の場合は最初の要素を使用

                document.getElementById('confirm-companyName').textContent = customer.company_name;
                document.getElementById('confirm-industry').textContent = customer.industry;
                document.getElementById('confirm-contact').textContent = customer.contact;
                document.getElementById('confirm-location').textContent = customer.location;
            })
            .catch(error => console.error(error));
    
        document.getElementById('delete-btn').addEventListener('click', () => {
            if (confirm("本当にこの顧客情報を削除しますか？")) {
                fetch(`${config.apiUrl}/customers/${id}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data =>{
                    if (data.success) {
                        alert("顧客情報が正常に削除されました。");
                        location.href = './list.html'; // 削除後に顧客一覧画面へリダイレクト
                    } else {
                        alert("顧客情報の削除に失敗しました。");
                    }
                })
                .catch(error => {
                    console.error("削除エラー", error);
                    alert("顧客情報の削除中にエラーが発生しました。");
                }); 
                } 
        });

    </script>
    <!-- BootstrapのJavaScriptの読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
