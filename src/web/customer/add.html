<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客情報入力</title>
    <!-- Bootstrap CSSの読み込み -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">顧客情報を入力してください</h2>
        <form id="customer-form">
            <div class="form-group">
                <label for="companyName">会社名:</label>
                <input type="text" class="form-control" id="companyName" name="companyname" required>
            </div>
            <div class="form-group">
                <label for="industry">業種:</label>
                <input type="text" class="form-control" id="industry" name="industry" required>
            </div>
            <div class="form-group">
                <label for="contact">連絡先:</label>
                <input type="text" class="form-control" id="contact" name="contact" required>
            </div>
            <div class="form-group">
                <label for="location">所在地:</label>
                <input type="text" class="form-control" id="location" name="location" required>
            </div>
            <button type="submit" class="btn btn-primary">確認画面へ</button>
        </form>
    </div>
    <script type="module">
        const form = document.getElementById('customer-form');
        // ページ読み込み時に、もし過去の入力データがあれば自動復元する（戻ってきた時のため）
        window.addEventListener('DOMContentLoaded', () => {
            const saveData = sessionStorage.getItem('customer_registration_data');
            if(saveData){
                const data = JSON.parse(saveData);
                form.companyname.value = data.companyname || '';
                form.industry.value = data.industry || '';
                form.contact.value = data.contact || '';
                form.location.value = data.location || '';
            }
        });
        // フォーム送信時の処理
        form.addEventListener('submit', function(e) {
            e.preventDefault(); //デフォルトの送信挙動をキャンセル
            //入力データを取得してオブジェクトにする。
            const formData = new FormData(this);
            const data = {
                companyname: formData.get('companyname'),
                industry: formData.get('industry'),
                contact: formData.get('contact'),
                location: formData.get('location')
            };
            //入力データをセッションストレージに保存する（確認画面で利用するため）
            sessionStorage.setItem('customer_registration_data', JSON.stringify(data));
            //確認画面へ遷移する
            window.location.href = 'add-confirm.html';
        });

    </script>
    <!-- BootstrapのJavaScriptの読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
